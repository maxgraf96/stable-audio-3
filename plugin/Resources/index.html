<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SA3 Variations</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <header>
      <h1>SA3</h1>
      <p id="status" class="status status-loading">starting…</p>
    </header>

    <div id="error-banner" class="error-banner" hidden>
      <span class="error-text" id="error-text"></span>
      <button type="button" class="error-dismiss" id="error-dismiss"
              aria-label="Dismiss error">×</button>
    </div>

    <section id="dropzone" class="dropzone">
      <p class="dropzone-hint">Drag a WAV / AIFF / FLAC / Ogg loop here</p>
      <p class="dropzone-meta" id="source-meta"></p>
      <audio id="source-audio" controls hidden></audio>
    </section>

    <section class="controls">
      <div class="row">
        <label for="preset">Preset</label>
        <select id="preset">
          <option value="free">Free variation (unconditional)</option>
          <option value="app">Preserve sound (steered + bar-aware inpaints)</option>
        </select>
      </div>
      <div class="row">
        <label for="noise">Noise (σmax)</label>
        <input type="range" id="noise" min="0.10" max="0.90" step="0.01" value="0.45" />
        <span class="num" id="noise-value">0.45</span>
      </div>
      <div class="row app-only" hidden>
        <label for="bpm">BPM</label>
        <input type="number" id="bpm" min="40" max="240" step="1" placeholder="auto" />
        <label for="key" class="inline">Key</label>
        <input type="text" id="key" placeholder="e.g. A minor" />
      </div>
      <div class="row app-only" hidden>
        <label for="user-prompt">Prompt</label>
        <input type="text" id="user-prompt"
               placeholder="e.g. muted electric piano, Rhodes amp tone" />
      </div>
      <div class="row">
        <button id="generate" class="primary" disabled>Generate 5 variations</button>
      </div>
    </section>

    <section class="variations" id="variations">
      <!-- 5 audition pads populated on each run -->
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
